# fly/api.toml — Trident Go REST API
app = "trident-api"
primary_region = "iad"

[build]
  dockerfile = "services/api/Dockerfile"

[env]
  PORT      = "3000"
  LOG_LEVEL = "info"
  # Connect to gRPC API over Fly private network (6PN)
  GRPC_ADDR = "trident-grpc-api.internal:50051"

# Secrets (set via: fly secrets set -a trident-api KEY=value)
# Required: DATABASE_URL, REDIS_URL, API_KEY_SALT, ADMIN_API_KEY, NETWORK

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [[http_service.checks]]
    interval     = "10s"
    timeout      = "5s"
    grace_period = "15s"
    method       = "GET"
    path         = "/v1/health"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"