# fly/grpc-api.toml — Trident gRPC API (Rust, trident-api binary)
app = "trident-grpc-api"
primary_region = "iad"

[build]
  dockerfile = "crates/api/Dockerfile"

[env]
  LOG_LEVEL = "info"

# Secrets (set via: fly secrets set -a trident-grpc-api KEY=value)
# Required: DATABASE_URL

[[services]]
  protocol = "tcp"
  internal_port = 50051

  [[services.ports]]
    port = 50051

  [[services.tcp_checks]]
    interval = "15s"
    timeout  = "2s"
    grace_period = "10s"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"