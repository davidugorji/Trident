version: "3.9"

# Production compose — runs all four services.
# All secrets are passed via environment variables; never hardcode values here.

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  indexer:
    build:
      context: ../crates/indexer
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      STELLAR_RPC_URL: ${STELLAR_RPC_URL}
      NETWORK: ${NETWORK}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS}
      INDEX_DIAGNOSTIC: ${INDEX_DIAGNOSTIC}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      PORT: ${PORT}
      API_KEY_SALT: ${API_KEY_SALT}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      indexer:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
