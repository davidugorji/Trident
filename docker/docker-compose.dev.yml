version: "3.9"

# Development compose — runs only the infrastructure dependencies.
# The indexer and API service are run locally (cargo run / go run) so that
# code changes reflect immediately without rebuilding containers.

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: trident
      POSTGRES_PASSWORD: password
      POSTGRES_DB: trident
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trident -d trident"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_dev_data:
  redis_dev_data:
